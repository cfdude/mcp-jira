# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# Supports STDIO transport for Smithery marketplace deployment.
# For HTTP transport, use PM2 with ecosystem.config.cjs (see README).

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - jiraEmail
      - jiraApiToken
      - jiraDomain
    properties:
      jiraEmail:
        type: string
        description: Your Jira account email.
      jiraApiToken:
        type: string
        description: API token for Jira access.
      jiraDomain:
        type: string
        description: Your Jira domain (e.g., "your-company" for your-company.atlassian.net).
      jiraConfigPath:
        type: string
        description: Optional path to .jira-config.json for multi-instance setup.
  commandFunction:
    |-
    config => ({command: 'node', args: ['build/index.js'], env: {JIRA_EMAIL: config.jiraEmail, JIRA_API_TOKEN: config.jiraApiToken, JIRA_DOMAIN: config.jiraDomain, ...(config.jiraConfigPath ? {JIRA_CONFIG_PATH: config.jiraConfigPath} : {})}, cwd: process.cwd()})
